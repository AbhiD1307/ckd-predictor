version: "3.9"

services:
  api:
    build: .
    container_name: ckd-api
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CKD_API_KEY=${CKD_API_KEY}
    volumes:
      - ./artifacts:/app/artifacts
    command: uvicorn ckd.api.server:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: ckd-dashboard
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CKD_API_KEY=${CKD_API_KEY}
    volumes:
      - ./artifacts:/app/artifacts
    command: >
      streamlit run src/ckd/app/dashboard.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
    depends_on:
      api:
        condition: service_healthy
